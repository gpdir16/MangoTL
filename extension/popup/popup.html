<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="stylesheet" href="popup.css" />
        <title>MangoTL Add-on</title>
    </head>
    <body>
        <main class="popup-shell">
            <header>
                <h1>MangoTL Add-on</h1>
                <p data-i18n="popupIntro">
                    MangoTL adds a compact translate control to supported comic images. Are you new here? Open the settings to set up your server and
                    language.
                </p>
            </header>

            <button id="options-button" type="button" data-i18n="popupOpenOptions">Open Settings</button>
        </main>
        <script src="../shared/i18n.js"></script>
        <script src="popup.js"></script>
    </body>
</html>
